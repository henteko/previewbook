<svg width="300" height="80" viewBox="0 0 300 80" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Previewbook">
  <!-- brand mark: light rounded tile + dark "P" + accent dot (mirrors the site topbar, dark theme) -->
  <g transform="translate(8 8)">
    <clipPath id="pb-clip-d"><rect x="0" y="0" width="64" height="64" rx="17"/></clipPath>
    <g clip-path="url(#pb-clip-d)">
      <rect x="0" y="0" width="64" height="64" rx="17" fill="#FAFAFA"/>
      <text x="31" y="45" text-anchor="middle" fill="#09090B" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="35" font-weight="700" letter-spacing="-1.4">P</text>
      <circle cx="44" cy="20" r="8.5" fill="#3b6fe0"/>
    </g>
  </g>
  <!-- wordmark -->
  <text x="88" y="53" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="36" font-weight="600" letter-spacing="-0.5" fill="#FAFAFA">Previewbook</text>
</svg>
